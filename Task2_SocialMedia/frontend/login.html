<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-form input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .auth-form button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .toggle-auth {
            text-align: center;
            margin-top: 15px;
            color: var(--primary-color);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="store-name">My Store</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="#">Cart</a>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <h2 id="auth-title">Login</h2>
            <form id="auth-form" class="auth-form">
                <input type="text" id="nameInput" placeholder="Full Name" style="display: none;">
                <input type="email" id="emailInput" placeholder="Email Address" required>
                <input type="password" id="passwordInput" placeholder="Password" required>
                <button type="submit" id="auth-btn">Login</button>
            </form>
            <p class="toggle-auth" id="toggle-auth-btn">Don't have an account? Register</p>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
