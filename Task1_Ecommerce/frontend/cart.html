<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-container { max-width: 800px; margin: 2rem auto; padding: 0 5%; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; background: var(--card-bg); margin-bottom: 10px; border-radius: 5px; }
        .cart-total { text-align: right; margin-top: 20px; font-size: 1.2rem; }
        .checkout-btn { background-color: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .remove-btn { background: #dc2626; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1 id="store-name">My Store</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main class="cart-container">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items"></div>
        <div class="cart-total">
            <p>Total: <strong>₹<span id="total-price">0</span></strong></p>
            <button class="checkout-btn" id="checkout-btn" style="display: none;">Proceed to Checkout</button>
        </div>
    </main>

    <script src="cart.js"></script>
</body>
</html>
